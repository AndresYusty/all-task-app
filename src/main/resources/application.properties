spring.application.name=all-task-app

# ====== Server ======
server.port=8080
server.servlet.context-path=/api

# ====== Datasource (MySQL) ======
# Ajusta host, puerto, nombre de BD, usuario y password según tu MySQL Workbench.
spring.datasource.url=jdbc:mysql://localhost:3306/todo_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Manchas12345.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ====== JPA / Hibernate ======
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ====== Logging ======
logging.level.org.springframework=INFO
logging.level.com.task.all=DEBUG
